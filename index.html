<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:  #e8c97e;
      --accent2: #a78bfa;
      --text-primary:   #f0ede8;
      --text-secondary: rgba(240,237,232,0.6);
    }
    html, body { min-height: 100%; width: 100%; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0a2a2a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Two layered canvases ── */
    #bgCanvas, #rainCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #bgCanvas   { z-index: 0; }
    #rainCanvas { z-index: 1; pointer-events: none; }

    /* ── Card ── */
    .card-wrap {
      position: relative;
      z-index: 10;
      width: min(420px, 92vw);
      animation: cardEntry 1s cubic-bezier(0.16,1,0.3,1) both;
      transition: transform 0.12s ease-out;
    }
    @keyframes cardEntry {
      from { opacity:0; transform:translateY(40px) scale(0.96); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .tag-hole {
      display: flex; justify-content: center;
      margin-bottom: -1px; position: relative; z-index: 2;
    }
    .tag-hole-inner {
      width:28px; height:28px;
      background:rgba(255,255,255,0.10);
      border:2px solid rgba(255,255,255,0.22);
      border-radius:50%;
      box-shadow:0 0 0 4px rgba(255,255,255,0.04);
      backdrop-filter:blur(8px);
    }

    .card {
      background: rgba(10, 60, 58, 0.72);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 24px;
      backdrop-filter: blur(20px) saturate(160%);

      overflow: hidden;
      position: relative;
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:50%;
      background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,transparent 100%);

    .luggage-label {

    .avatar-ring {

      background-size:300% 300%;

    }
    @keyframes ringRotate {
      from { background-position:0% 50%; }
      to   { background-position:300% 50%; }
    }
    .avatar-inner {
      width:100%; height:100%; border-radius:50%;
      background:rgba(20,15,40,0.85);
      border:2px solid rgba(20,15,40,0.5);
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .avatar-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

    .name-block { text-align:center; }
    .name {
      font-family:'JetBrains Mono', monospace;
      font-size:22px; font-weight:700;
      color:var(--text-primary); letter-spacing:0.02em; line-height:1.1;
    }
    .name-sub {
      font-size:11px; color:var(--text-secondary);

    .divider {

<script>
/* ═══════════════════════════════════════════════════════
   LAYER 1 — TEAL BASE + BLOB GLOW  (bgCanvas)
═══════════════════════════════════════════════════════ */
const bgCanvas   = document.getElementById('bgCanvas');
const bgCtx      = bgCanvas.getContext('2d');
const rainCanvas = document.getElementById('rainCanvas');
const rCtx       = rainCanvas.getContext('2d');
let W, H;

function resize() {
  W = bgCanvas.width  = rainCanvas.width  = window.innerWidth;
  H = bgCanvas.height = rainCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* Soft glowing blob — just a big radial wash for depth */
class GlowBlob {
  constructor(colorStr, r, driftSpeed) {
    this.color = colorStr;
    this.r = r;
    this.cx = Math.random() * W;
    this.cy = Math.random() * H;
    this.angle = Math.random() * Math.PI * 2;
    this.orbitR = 80 + Math.random() * 120;
    this.angSpeed = (0.0003 + Math.random() * 0.0004) * (Math.random() > .5 ? 1 : -1);
    this.driftX = (Math.random() - 0.5) * driftSpeed;
    this.driftY = (Math.random() - 0.5) * driftSpeed;
  }
  update() {
    this.angle += this.angSpeed;
    this.cx += this.driftX;
    this.cy += this.driftY;
    // Bounce softly at edges
    if (this.cx < -200 || this.cx > W + 200) this.driftX *= -1;
    if (this.cy < -200 || this.cy > H + 200) this.driftY *= -1;
  }
  get x() { return this.cx + Math.cos(this.angle) * this.orbitR; }
  get y() { return this.cy + Math.sin(this.angle) * this.orbitR; }
  draw(ctx) {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r);
    g.addColorStop(0,   this.color);
    g.addColorStop(0.5, this.color.replace(/[\d.]+\)$/, '0.18)'));
    g.addColorStop(1,   this.color.replace(/[\d.]+\)$/, '0)'));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
}

const glowBlobs = [
  new GlowBlob('rgba(0,200,180,0.38)',  420, 0.18),
  new GlowBlob('rgba(0,160,200,0.30)',  380, 0.14),
  new GlowBlob('rgba(20,220,200,0.25)', 300, 0.22),
  new GlowBlob('rgba(0,180,160,0.28)',  350, 0.16),
  new GlowBlob('rgba(10,140,180,0.22)', 280, 0.20),
];

function drawBg() {
  /* Solid teal base — matching the PNG's #1ec8c0 hue */
  bgCtx.fillStyle = '#12b5ae';
  bgCtx.fillRect(0, 0, W, H);

  bgCtx.globalCompositeOperation = 'screen';
  for (const b of glowBlobs) { b.update(); b.draw(bgCtx); }

  /* Gentle vignette for depth */
  bgCtx.globalCompositeOperation = 'source-over';
  const vg = bgCtx.createRadialGradient(W/2, H/2, H*0.15, W/2, H/2, H*0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,30,30,0.45)');
  bgCtx.fillStyle = vg;
  bgCtx.fillRect(0, 0, W, H);
}

/* ═══════════════════════════════════════════════════════
   LAYER 2 — ANIMATED RAIN STREAKS  (rainCanvas)
   Mimics the loading.io tile exactly:
   - Angle: ~-40° (top-right to bottom-left fall)
   - Two types: bright white and bright cyan
   - Varying length (16–60px) and opacity
   - Streaks scroll continuously down-right then wrap
═══════════════════════════════════════════════════════ */
/* Streak definition — fixed tile-space position, animated offset */
const ANGLE_RAD = (-40 * Math.PI) / 180; // ~-40 degrees
const cos = Math.cos(ANGLE_RAD);
const sin = Math.sin(ANGLE_RAD);

/* Speed: pixels per frame along the fall direction */
const FALL_SPEED = 1.4;

const TILE = 164;

/* Build a grid of streaks that tiles the screen */
function buildStreaks() {
  const streaks = [];
  /* We place them in a virtual 164×164 tile (matching the PNG),
     then repeat the tile to fill the screen + bleed */
  const cols = Math.ceil((W + TILE * 4) / TILE) + 1;
  const rows = Math.ceil((H + TILE * 4) / TILE) + 1;

  /* Streak positions within one tile — measured from the PNG visually */
  const template = [
    // [tx, ty, length, lineWidth, type]  type 0=white, 1=cyan
    { tx: 20,  ty: 30,  len: 44, lw: 3.5, type: 0, alpha: 0.85 },
    { tx: 70,  ty: 10,  len: 24, lw: 2.5, type: 1, alpha: 0.70 },
    { tx: 120, ty: 50,  len: 16, lw: 2,   type: 1, alpha: 0.55 },
    { tx: 40,  ty: 90,  len: 32, lw: 3,   type: 0, alpha: 0.65 },
    { tx: 100, ty: 80,  len: 52, lw: 4,   type: 0, alpha: 0.90 },
    { tx: 150, ty: 20,  len: 20, lw: 2,   type: 1, alpha: 0.50 },
    { tx: 10,  ty: 130, len: 28, lw: 2.5, type: 1, alpha: 0.60 },
    { tx: 80,  ty: 140, len: 18, lw: 2,   type: 1, alpha: 0.45 },
    { tx: 140, ty: 120, len: 38, lw: 3,   type: 0, alpha: 0.75 },
    { tx: 55,  ty: 60,  len: 14, lw: 1.5, type: 1, alpha: 0.40 },
    { tx: 130, ty: 100, len: 22, lw: 2,   type: 1, alpha: 0.55 },
  ];

  for (let col = -2; col < cols; col++) {
    for (let row = -2; row < rows; row++) {
      for (const t of template) {
        streaks.push({
          baseX: col * TILE + t.tx,
          baseY: row * TILE + t.ty,
          len:   t.len,
          lw:    t.lw,
          type:  t.type,
          color: t.type === 0 ? 'rgba(255,255,255,' : 'rgba(0,240,255,',
          alpha: t.alpha,
          phase: Math.random() * 200,
        });
      }
    }
  }
  return streaks;
}

let streaks = buildStreaks();
window.addEventListener('resize', () => { streaks = buildStreaks(); });

/* Independent offsets per type — white faster, cyan slower */
const WHITE_SPEED = 2.2;
const CYAN_SPEED  = 0.8;
let wOffX = 0, wOffY = 0;   // white offset
let cOffX = 0, cOffY = 0;   // cyan offset

function drawRain() {
  rCtx.clearRect(0, 0, W, H);

  /* Advance offsets independently — top-right to bottom-left */
  wOffX -= WHITE_SPEED * Math.abs(cos) * 0.5;
  wOffY += WHITE_SPEED * Math.abs(sin) * 0.9;
  if (wOffX < -TILE) wOffX += TILE;
  if (wOffY >  TILE) wOffY -= TILE;

  cOffX -= CYAN_SPEED * Math.abs(cos) * 0.5;
  cOffY += CYAN_SPEED * Math.abs(sin) * 0.9;
  if (cOffX < -TILE) cOffX += TILE;
  if (cOffY >  TILE) cOffY -= TILE;

  rCtx.save();
  rCtx.lineCap = 'round';

  for (const s of streaks) {
    const ox = s.type === 0 ? wOffX : cOffX;
    const oy = s.type === 0 ? wOffY : cOffY;
    const x  = s.baseX + ox;
    const y  = s.baseY + oy;

    const hx = cos * s.len / 2;
    const hy = sin * s.len / 2;

    rCtx.beginPath();
    rCtx.moveTo(x - hx, y - hy);
    rCtx.lineTo(x + hx, y + hy);
    rCtx.lineWidth   = s.lw;
    rCtx.strokeStyle = s.color + s.alpha + ')';
    rCtx.stroke();
  }

  rCtx.restore();
}

/* ═══════════════════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════════════════ */
function loop() {
  drawBg();
  drawRain();
  requestAnimationFrame(loop);
}
loop();

/* ── Subtle card tilt on mouse move ── */
const cardWrap = document.getElementById('cardWrap');
document.addEventListener('mousemove', e => {
  const dx = (e.clientX - W/2) / (W/2);
  const dy = (e.clientY - H/2) / (H/2);
  cardWrap.style.transform = `perspective(900px) rotateY(${dx*5}deg) rotateX(${-dy*5}deg)`;
});
document.addEventListener('mouseleave', () => {
  cardWrap.style.transform = 'perspective(900px) rotateY(0) rotateX(0)';
});
</script>
</body>
